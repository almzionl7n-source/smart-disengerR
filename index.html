<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART DESIGNER PRO | Engine v6.0</title>
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</head>
<body class="bg-[#050505] text-white overflow-hidden select-none">

    <div id="status-bar" class="h-1 bg-blue-600 w-0 fixed top-0 z-[9999] transition-all duration-500"></div>

    <header class="main-header">
        <div class="logo-section">
            <div class="engine-logo">
                <i class="fas fa-microchip"></i>
            </div>
            <div class="brand">
                <span class="brand-main">SMART</span>
                <span class="brand-sub">DESIGNER <small>v6.0</small></span>
            </div>
        </div>

        <div class="action-center">
            <div class="zoom-controls">
                <button onclick="changeZoom(-0.1)"><i class="fas fa-search-minus"></i></button>
                <span id="zoom-val">100%</span>
                <button onclick="changeZoom(0.1)"><i class="fas fa-search-plus"></i></button>
            </div>
            <div class="divider"></div>
            <button class="btn-secondary" onclick="undo()"><i class="fas fa-undo"></i></button>
            <button class="btn-secondary" onclick="redo()"><i class="fas fa-redo"></i></button>
            <div class="divider"></div>
            <button class="btn-primary ai-glow" onclick="openExportModal()">
                <i class="fas fa-cloud-download-alt"></i> تصدير المشروع
            </button>
        </div>
    </header>

    <main class="studio-container">
        
        <aside class="main-toolbar">
            <nav class="tool-nav">
                <button class="nav-item active" data-target="panel-ai" title="الذكاء الاصطناعي">
                    <i class="fas fa-brain"></i>
                    <span>الذكاء</span>
                </button>
                <button class="nav-item" data-target="panel-elements" title="العناصر">
                    <i class="fas fa-shapes"></i>
                    <span>عناصر</span>
                </button>
                <button class="nav-item" data-target="panel-text" title="النصوص">
                    <i class="fas fa-font"></i>
                    <span>نصوص</span>
                </button>
                <button class="nav-item" data-target="panel-draw" title="الرسم">
                    <i class="fas fa-paint-brush"></i>
                    <span>رسم</span>
                </button>
                <button class="nav-item" data-target="panel-uploads" title="المرفوعات">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>رفع</span>
                </button>
            </nav>
            <div class="toolbar-footer">
                <button class="settings-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </aside>

        <aside class="control-panel">
            <div id="panel-ai" class="panel-content">
                <h2 class="panel-header">محرك AI التوليدي</h2>
                <div class="ai-box">
                    <textarea id="ai-prompt" placeholder="صف ما تريد تصميمه بالإنجليزية..."></textarea>
                    <button id="generate-btn" class="ai-execute">
                        <span>توليد صورة ذكية</span>
                        <i class="fas fa-sparkles"></i>
                    </button>
                </div>
                <div class="ai-suggestions">
                    <span class="tag">Cyberpunk</span>
                    <span class="tag">Minimalist</span>
                    <span class="tag">Saudi 2030</span>
                </div>
            </div>

            <div id="panel-elements" class="panel-content hidden">
                <h2 class="panel-header">المكتبة الهندسية</h2>
                <div class="elements-grid">
                    <div class="elem-card" onclick="addShape('rect')"><i class="fas fa-square"></i><span>مربع</span></div>
                    <div class="elem-card" onclick="addShape('circle')"><i class="fas fa-circle"></i><span>دائرة</span></div>
                    <div class="elem-card" onclick="addShape('triangle')"><i class="fas fa-play -rotate-90"></i><span>مثلث</span></div>
                    <div class="elem-card" onclick="addShape('star')"><i class="fas fa-star"></i><span>نجمة</span></div>
                </div>
            </div>

            <div id="panel-draw" class="panel-content hidden">
                <h2 class="panel-header">إعدادات الريشة</h2>
                <div class="setting-group">
                    <label>حجم الفرشاة</label>
                    <input type="range" id="brush-size" min="1" max="100" value="10">
                </div>
                <div class="setting-group">
                    <label>لون الرسم</label>
                    <div id="brush-color-picker"></div>
                </div>
                <button class="btn-full" onclick="toggleDrawingMode()">تفعيل وضع الرسم</button>
            </div>
        </aside>

        <section class="canvas-viewport">
            <div id="canvas-wrapper" class="canvas-inner shadow-2xl">
                <canvas id="main-canvas"></canvas>
            </div>
            
            <footer class="canvas-footer">
                <div class="footer-stats">
                    <span>العناصر: <b id="obj-count">0</b></span>
                    <div class="v-divider"></div>
                    <span>الطبقة النشطة: <b id="active-layer">Background</b></span>
                </div>
                <div class="footer-info">
                    <i class="fas fa-keyboard"></i> اختصارات النظام مفعلة
                </div>
            </footer>
        </aside>

        <aside class="layers-panel">
            <div class="tabs-header">
                <button class="tab-btn active">الخصائص</button>
                <button class="tab-btn">الطبقات</button>
            </div>
            
            <div class="tab-body">
                <div id="property-editor" class="prop-editor empty">
                    <div class="empty-state">
                        <i class="fas fa-mouse-pointer"></i>
                        <p>حدد عنصراً لتعديله</p>
                    </div>
                </div>

                <div id="layers-list" class="layers-stack hidden">
                    </div>
            </div>
        </aside>

    </main>

    <div id="export-modal" class="modal-overlay hidden">
        <div class="modal-content animate__animated animate__zoomIn">
            <h3>تصدير المشروع النهائي</h3>
            <p>اختر الصيغة والجودة المناسبة لتصميمك</p>
            <div class="export-options">
                <button onclick="doExport('png')">PNG (شفاف)</button>
                <button onclick="doExport('jpg')">JPG (عالي الجودة)</button>
                <button onclick="doExport('json')">ملف مشروع (للتعديل لاحقاً)</button>
            </div>
            <button class="close-modal" onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
